<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Students — Login</title>
		<link rel="stylesheet" href="./style.css" />
		<link rel="shortcut icon" href="./favicon.svg" type="image/x-icon" />
		<script defer src="./script.js"></script>
	</head>
	<body>
		<div class="auth-container">
			<div class="auth-card">
				<h1>Students</h1>
				<p class="auth-subtitle">EPITA — Computer Science</p>

				<div class="auth-tabs">
					<button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Log In</button>
					<button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
				</div>

				<!-- Login form -->
				<form id="login-form" class="auth-form">
					<div class="form-group">
						<label for="login-email">Email</label>
						<input type="email" id="login-email" placeholder="you@example.com" required />
					</div>
					<div class="form-group">
						<label for="login-password">Password</label>
						<input type="password" id="login-password" placeholder="••••••••" required />
					</div>
					<p id="login-error" class="form-error" hidden></p>
					<button type="submit" class="btn-primary btn-full">Log In</button>
				</form>

				<!-- Signup form -->
				<form id="signup-form" class="auth-form" hidden>
					<div class="form-group">
						<label for="signup-name">Full Name</label>
						<input type="text" id="signup-name" placeholder="Jane Doe" required />
					</div>
					<div class="form-group">
						<label for="signup-email">Email</label>
						<input type="email" id="signup-email" placeholder="you@example.com" required />
					</div>
					<div class="form-group">
						<label for="signup-password">Password</label>
						<input type="password" id="signup-password" placeholder="••••••••" required />
					</div>
					<div class="form-row">
						<div class="form-group">
							<label for="signup-major">Major</label>
							<input type="text" id="signup-major" placeholder="Computer Science" required />
						</div>
						<div class="form-group">
							<label for="signup-gpa">GPA</label>
							<input type="number" id="signup-gpa" placeholder="3.5" step="0.1" min="0" max="4" required />
						</div>
					</div>
					<p id="signup-error" class="form-error" hidden></p>
					<button type="submit" class="btn-primary btn-full">Sign Up</button>
				</form>
			</div>
		</div>
	</body>
</html>
